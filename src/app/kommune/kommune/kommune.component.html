<ng-container *transloco="let t; prefix: 'kommune'">
<div>
    @if (loading$ | async) {
        <app-spinner/>
    } @else {
        <ul>
            @for (link of links$ | async; track link) {
                <li><a [href]="link.link" target="_blank" rel="noopener noreferrer">{{ link.description ?? t('program') }}</a></li>
            }
        </ul>
        @if(noLinks$ | async) {
            <div class="missing">{{ t('missing') }}<a routerLink="/oppdatering">{{ t('contribute') }}</a>
            </div>
        }
    }
</div>
</ng-container>
